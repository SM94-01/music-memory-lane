<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#08080b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>TraX — Track your music journey</title>
    <meta name="description" content="A social diary for music lovers. Track, rate, and remember the albums that shaped you." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" />
    <style>
      html, body {
        position: fixed;
        width: 100%;
        height: 100vh;
        height: 100dvh; /* Viewport dinamico per mobile */
        overflow: hidden;
      }

      body {
        margin: 0;
        padding: 0;
      }

      #root {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      input, textarea, select {
        font-size: 16px; /* Previene zoom automatico su iOS durante focus */
      }

      /* Evita layout shift quando la tastiera appare */
      html {
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/mobile-entry.tsx"></script>
  </body>
</html>
